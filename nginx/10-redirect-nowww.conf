# -----------------------------------------------------------------------------
# mangolila.at (ohne www) → https://www.mangolila.at
#
# Setup:
#   1. Zertifikat auf mangolila.at erweitern (falls noch nicht geschehen):
#      certbot --expand -d www.mangolila.at -d mangolila.at
#
#   2. Diese Datei nach sites-available kopieren und aktivieren:
#      cp 12-redirect-nowww.conf /etc/nginx/sites-available/12-redirect-nowww.conf
#      ln -s /etc/nginx/sites-available/12-redirect-nowww.conf /etc/nginx/sites-enabled/
#
#   3. Nginx testen und neu laden:
#      nginx -t && systemctl reload nginx
# -----------------------------------------------------------------------------

# HTTP → www
server {
    listen      80;
    listen      [::]:80;
    server_name mangolila.at;

    return 301 https://www.mangolila.at$request_uri;
}

# HTTPS → www
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    server_name mangolila.at;

    ssl_certificate     /etc/letsencrypt/live/www.mangolila.at/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.mangolila.at/privkey.pem;

    return 301 https://www.mangolila.at$request_uri;
}
