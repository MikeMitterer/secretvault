# ── SecretVault Subdomain ─────────────────────────────────────────────────────
#
# Setup:
#   1. Zertifikat für neue Subdomain ausstellen:
#      certbot certonly --nginx -d sv.mangolila.at
#
#   2. Diese Datei nach sites-available kopieren und aktivieren:
#      cp sv.mangolila.at.conf /etc/nginx/sites-available/sv.mangolila.at
#      ln -s /etc/nginx/sites-available/sv.mangolila.at /etc/nginx/sites-enabled/
#
#   3. Document Root anlegen:
#      mkdir -p /var/www/sv.mangolila.at
#
#   4. Nginx testen und neu laden:
#      nginx -t && systemctl reload nginx
#
# Deploy:
#   make deploy  (aus dem Projektverzeichnis)
# ─────────────────────────────────────────────────────────────────────────────

# HTTP → HTTPS Redirect
server {
    listen      80;
    listen      [::]:80;
    server_name sv.mangolila.at;

    return 301 https://$server_name$request_uri;
}

# HTTPS
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    server_name sv.mangolila.at;

    # SSL — Let's Encrypt (certbot)
    ssl_certificate     /etc/letsencrypt/live/sv.mangolila.at/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sv.mangolila.at/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Document Root (Vite dist/)
    root  /var/www/sv.mangolila.at;
    index index.html;

    # SPA — alle Routen auf index.html umleiten
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statische Assets langfristig cachen (Vite erzeugt Content-Hash im Dateinamen)
    location ~* \.(js|css|woff2|woff|ttf|ico|png|svg|webp)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html niemals cachen (immer frisch beim Deploy)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires    0;
    }

    # Security Headers
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"               always;
    add_header Referrer-Policy        "strict-origin"         always;
    add_header Permissions-Policy     "geolocation=(), camera=(), microphone=()" always;

    # CSP — kein inline-eval nötig (Vite baut sauber), keine externen Ressourcen
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'none'; frame-ancestors 'none';"
        always;

    # Zugriff auf versteckte Dateien sperren
    location ~ /\. {
        deny all;
    }
}
