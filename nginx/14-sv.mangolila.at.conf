# -----------------------------------------------------------------------------
# SecretVault — sv.mangolila.at
# -----------------------------------------------------------------------------

server {
    listen 80;
    server_name sv.mangolila.at;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sv.mangolila.at;

    # Letsencrypt - mangolila.at
    ssl_certificate     /etc/letsencrypt/live/mangolila.at/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mangolila.at/privkey.pem;

    root  /var/www/static/secretvault;
    index index.html;

    # SPA — alle Routen auf index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statische Assets langfristig cachen (Vite erzeugt Content-Hash im Dateinamen)
    location ~* \.(js|css|woff2|woff|ttf|ico|png|svg|webp)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html niemals cachen
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }
}
